<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>河东卷 · 荐读脊柱预览</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600&family=Noto+Serif+SC:wght@500;600;700&display=swap" rel="stylesheet">
<style>/* 山河异闻 · 入世界面
   纸本江湖：暖墨、旧金、宽行距、少栏乱、沉浸阅读无侧栏 */

:root {
  --ink: #1c1612;
  --ink-soft: #3a322b;
  --ink-mute: #6b5e52;
  --paper: #f3ebe0;
  --paper-2: #ebe1d3;
  --paper-3: #e0d4c3;
  --gold: #8b6914;
  --gold-bright: #b8892a;
  --cinnabar: #8c2f2b;
  --cinnabar-soft: #a84842;
  --line: rgba(28, 22, 18, 0.12);
  --line-strong: rgba(28, 22, 18, 0.22);
  --shadow: 0 18px 50px rgba(28, 22, 18, 0.12);
  --serif: "Noto Serif SC", "Songti SC", "STSong", "SimSun", serif;
  --sans: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
  --max: 1120px;
  --read-max: 42rem;
  --bar-h: 3.5rem;
  --radius: 2px;
}

*, *::before, *::after { box-sizing: border-box; }
html { font-size: 17px; -webkit-font-smoothing: antialiased; }
body {
  margin: 0;
  min-height: 100vh;
  font-family: var(--sans);
  color: var(--ink);
  background: var(--paper);
  line-height: 1.7;
}
button, input { font: inherit; color: inherit; }
button { cursor: pointer; border: 0; background: none; }
a { color: inherit; text-decoration: none; }
[hidden] { display: none !important; }

.bg-ink {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 80% 50% at 10% -10%, rgba(139,105,20,.08), transparent 50%),
    radial-gradient(ellipse 60% 40% at 100% 100%, rgba(140,47,43,.05), transparent 45%),
    linear-gradient(180deg, #f6f0e6 0%, var(--paper) 40%, #e8dfd0 100%);
}
.bg-grain {
  position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: .35;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.45'/%3E%3C/svg%3E");
}
/* reading mode: hide shell scrollbars feel */
body.is-reading {
  overflow: hidden;
}
body.is-reading .bg-ink,
body.is-reading .bg-grain {
  opacity: .55;
}


/* ========== Shell ========== */
.app-shell {
  position: relative; z-index: 1;
  min-height: 100vh;
  display: grid;
  grid-template-rows: var(--bar-h) 1fr auto;
}
.topbar {
  position: sticky; top: 0; z-index: 20;
  display: flex; align-items: center; gap: 1.25rem;
  height: var(--bar-h);
  padding: 0 1.25rem;
  background: rgba(26, 20, 16, 0.94);
  color: #f0e6d6;
  border-bottom: 1px solid rgba(184, 137, 42, 0.25);
  backdrop-filter: blur(8px);
}
.brand {
  display: flex; align-items: center; gap: .7rem;
  flex-shrink: 0;
}
.seal {
  width: 2rem; height: 2rem;
  display: grid; place-items: center;
  border: 1.5px solid var(--gold-bright);
  color: var(--gold-bright);
  font-family: var(--serif);
  font-weight: 700;
  font-size: 1.05rem;
  letter-spacing: .05em;
}
.brand-text { display: flex; flex-direction: column; line-height: 1.15; }
.brand-text b {
  font-family: var(--serif);
  font-weight: 600;
  font-size: 1rem;
  letter-spacing: .12em;
}
.brand-text small {
  font-size: .68rem;
  color: rgba(240,230,214,.55);
  letter-spacing: .04em;
}
.nav-main {
  display: flex; align-items: center; gap: .15rem;
  flex: 1; justify-content: center;
}
.nav-item {
  padding: .45rem .9rem;
  color: rgba(240,230,214,.62);
  font-size: .9rem;
  letter-spacing: .18em;
  border-bottom: 2px solid transparent;
  transition: color .15s, border-color .15s;
}
.nav-item:hover { color: #f0e6d6; }
.nav-item.is-active {
  color: var(--gold-bright);
  border-bottom-color: var(--gold-bright);
}
.topbar-right {
  display: flex; align-items: center; gap: .75rem;
  flex-shrink: 0;
}
.era-pill {
  font-size: .72rem;
  letter-spacing: .06em;
  color: rgba(240,230,214,.5);
  padding: .25rem .55rem;
  border: 1px solid rgba(240,230,214,.15);
}
.btn-ghost {
  padding: .35rem .7rem;
  border: 1px solid rgba(184,137,42,.4);
  color: var(--gold-bright);
  font-size: .8rem;
  letter-spacing: .12em;
}
.btn-ghost:hover { background: rgba(184,137,42,.12); }

.main-view {
  width: min(var(--max), calc(100% - 2.5rem));
  margin: 0 auto;
  padding: 1.75rem 0 3rem;
}
.statusbar {
  display: flex; justify-content: space-between; gap: 1rem;
  padding: .55rem 1.25rem;
  font-size: .75rem;
  color: var(--ink-mute);
  border-top: 1px solid var(--line);
  background: rgba(243,235,224,.85);
  letter-spacing: .04em;
}

/* ========== Typography helpers ========== */
.kicker {
  font-size: .72rem;
  letter-spacing: .28em;
  text-transform: uppercase;
  color: var(--gold);
  margin: 0 0 .5rem;
}
.page-title {
  font-family: var(--serif);
  font-weight: 600;
  font-size: clamp(1.75rem, 3.2vw, 2.35rem);
  line-height: 1.25;
  letter-spacing: .08em;
  margin: 0 0 .75rem;
}
.lead {
  margin: 0 0 1.5rem;
  max-width: 36rem;
  color: var(--ink-soft);
  font-size: 1rem;
  line-height: 1.85;
}
.section-head {
  display: flex; align-items: baseline; justify-content: space-between;
  gap: 1rem;
  margin: 2.25rem 0 1rem;
  padding-bottom: .55rem;
  border-bottom: 1px solid var(--line-strong);
}
.section-head h2 {
  margin: 0;
  font-family: var(--serif);
  font-weight: 600;
  font-size: 1.15rem;
  letter-spacing: .2em;
}
.section-head span {
  font-size: .78rem;
  color: var(--ink-mute);
  letter-spacing: .08em;
}

/* ========== Home ========== */
.hero {
  display: grid;
  grid-template-columns: 1.15fr .85fr;
  gap: 2rem;
  align-items: end;
  padding: 1.25rem 0 1.5rem;
  border-bottom: 1px solid var(--line);
}
.hero-quote {
  font-family: var(--serif);
  font-size: clamp(1.9rem, 3.8vw, 2.75rem);
  font-weight: 600;
  line-height: 1.35;
  letter-spacing: .06em;
  margin: 0 0 1rem;
}
.hero-quote em {
  font-style: normal;
  color: var(--cinnabar);
}
.hero-note {
  font-size: .92rem;
  color: var(--ink-soft);
  line-height: 1.85;
  max-width: 28rem;
  margin: 0;
}
.hero-side {
  padding: 1.1rem 1.2rem;
  background: rgba(255,255,255,.35);
  border: 1px solid var(--line);
  border-left: 3px solid var(--gold);
}
.hero-side h3 {
  margin: 0 0 .5rem;
  font-family: var(--serif);
  font-size: .95rem;
  letter-spacing: .18em;
  font-weight: 600;
}
.hero-side p {
  margin: 0;
  font-size: .88rem;
  color: var(--ink-soft);
  line-height: 1.75;
}
.axis-row {
  display: flex; flex-wrap: wrap; gap: .35rem .65rem;
  margin-top: 1.25rem;
  font-size: .75rem;
  letter-spacing: .12em;
  color: var(--ink-mute);
}
.axis-row i {
  width: 1.25rem; height: 1px;
  align-self: center;
  background: var(--line-strong);
}

/* metrics */
.metric-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: .75rem;
  margin-top: 1.5rem;
}
.metric {
  padding: 1rem 1.05rem;
  background: rgba(255,255,255,.4);
  border: 1px solid var(--line);
  text-align: left;
  transition: border-color .15s, transform .15s;
}
.metric:hover { border-color: var(--gold); transform: translateY(-1px); }
.metric strong {
  display: block;
  font-family: var(--serif);
  font-size: 1.65rem;
  font-weight: 600;
  color: var(--gold);
  letter-spacing: .04em;
  line-height: 1.1;
}
.metric span {
  display: block;
  margin-top: .35rem;
  font-size: .88rem;
  letter-spacing: .08em;
}
.metric small {
  display: block;
  margin-top: .2rem;
  font-size: .75rem;
  color: var(--ink-mute);
}

/* group cards — 地脉主入口 */
.group-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 1rem;
}
.group-card {
  position: relative;
  padding: 1.35rem 1.4rem 1.25rem;
  text-align: left;
  background: linear-gradient(145deg, rgba(255,255,255,.55), rgba(243,235,224,.9));
  border: 1px solid var(--line);
  box-shadow: var(--shadow);
  transition: border-color .15s, box-shadow .15s;
}
.group-card:hover {
  border-color: rgba(139,105,20,.45);
  box-shadow: 0 22px 48px rgba(28,22,18,.14);
}
.group-card .tag {
  display: inline-block;
  font-size: .68rem;
  letter-spacing: .2em;
  color: var(--cinnabar);
  border: 1px solid rgba(140,47,43,.35);
  padding: .1rem .4rem;
  margin-bottom: .65rem;
}
.group-card h3 {
  margin: 0 0 .45rem;
  font-family: var(--serif);
  font-size: 1.45rem;
  font-weight: 600;
  letter-spacing: .16em;
}
.group-card p {
  margin: 0 0 .85rem;
  font-size: .9rem;
  color: var(--ink-soft);
  line-height: 1.7;
  min-height: 3.1em;
}
.kernel {
  display: flex; flex-wrap: wrap; gap: .35rem;
}
.kernel span {
  font-size: .72rem;
  letter-spacing: .06em;
  color: var(--ink-mute);
  padding: .15rem .4rem;
  background: rgba(28,22,18,.04);
  border: 1px solid var(--line);
}
.group-card .meta-line {
  margin-top: .9rem;
  font-size: .75rem;
  color: var(--ink-mute);
  letter-spacing: .08em;
}

/* entry list */
.entry-list { display: flex; flex-direction: column; gap: .55rem; }
.entry-list.path-list .entry-row {
  grid-template-columns: 3.2rem 3.6rem 1fr auto;
}
.entry-row {
  display: grid;
  grid-template-columns: 4.2rem 1fr auto;
  gap: .75rem 1rem;
  align-items: center;
  padding: .95rem 1.1rem;
  text-align: left;
  background: rgba(255,255,255,.32);
  border: 1px solid var(--line);
  transition: border-color .15s, background .15s;
}
.entry-row.in-path {
  border-left: 3px solid rgba(139,105,20,.45);
}
.entry-row:hover {
  border-color: rgba(139,105,20,.4);
  background: rgba(255,255,255,.55);
}
.entry-row .chap-ord {
  font-family: var(--serif);
  font-size: .72rem;
  letter-spacing: .08em;
  color: var(--gold);
  white-space: nowrap;
}
.entry-row .genre-tag {
  font-family: var(--serif);
  font-size: .82rem;
  font-weight: 600;
  letter-spacing: .18em;
  color: var(--cinnabar-soft);
  writing-mode: horizontal-tb;
  border-left: 2px solid rgba(140,47,43,.35);
  padding-left: .45rem;
}
.entry-row .title-block b {
  display: block;
  font-family: var(--serif);
  font-weight: 600;
  font-size: 1.12rem;
  letter-spacing: .14em;
}
.entry-row .title-block small {
  display: block;
  margin-top: .2rem;
  font-size: .78rem;
  color: var(--ink-mute);
  letter-spacing: .04em;
}
.badge {
  font-size: .68rem;
  letter-spacing: .12em;
  padding: .22rem .5rem;
  border: 1px solid var(--line-strong);
  color: var(--ink-mute);
  white-space: nowrap;
}
.badge.seed {
  color: var(--gold);
  border-color: rgba(139,105,20,.35);
}
.badge.ok {
  border-color: rgba(139,105,20,.4);
  color: var(--gold);
}

/* filters */
.filter-row {
  display: flex; flex-wrap: wrap; gap: .4rem;
  margin-bottom: 1.1rem;
}
.chip {
  padding: .35rem .7rem;
  font-size: .8rem;
  letter-spacing: .1em;
  border: 1px solid var(--line-strong);
  color: var(--ink-soft);
  background: rgba(255,255,255,.25);
}
.chip:hover { border-color: var(--gold); color: var(--ink); }
.chip.is-active {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
}
.chip.chip-action {
  border-color: rgba(139,105,20,.5);
  color: var(--gold);
  letter-spacing: .12em;
}
.chip.chip-action:hover {
  background: rgba(139,105,20,.12);
  color: var(--ink);
}
.volume-note {
  margin: 0 0 1.25rem;
  padding: .75rem 1rem;
  font-size: .85rem;
  line-height: 1.7;
  color: var(--ink-soft);
  border: 1px dashed var(--line-strong);
  background: rgba(255,255,255,.25);
}
.volume-note b {
  color: var(--gold);
  font-weight: 600;
  letter-spacing: .08em;
  margin-right: .35rem;
}
.vol-sub {
  font-style: normal;
  color: var(--cinnabar-soft);
  letter-spacing: .08em;
}
.hero-cta {
  margin-top: 1rem;
  display: inline-block;
}

/* ========== 番茄四指标 · 规范 24 ========== */
.tomato-strip {
  margin: 1.5rem 0 0;
  padding: 1rem 1.15rem 1.1rem;
  background: linear-gradient(135deg, rgba(28,22,18,.04), rgba(139,105,20,.06));
  border: 1px solid var(--line-strong);
  border-left: 3px solid var(--gold);
}
.tomato-strip.is-compact {
  margin-top: 0;
  padding: .85rem 1rem;
}
.tomato-strip-head {
  display: flex;
  flex-wrap: wrap;
  align-items: baseline;
  justify-content: space-between;
  gap: .5rem 1rem;
  margin-bottom: .75rem;
}
.tomato-kicker {
  font-size: .72rem;
  letter-spacing: .22em;
  color: var(--gold);
  font-weight: 600;
}
.tomato-hint {
  font-size: .75rem;
  color: var(--ink-mute);
  letter-spacing: .06em;
}
.tomato-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: .65rem;
}
.tomato-cell {
  padding: .65rem .7rem;
  background: rgba(255,255,255,.45);
  border: 1px solid var(--line);
}
.tomato-cell b {
  display: block;
  font-family: var(--serif);
  font-size: .72rem;
  letter-spacing: .14em;
  color: var(--cinnabar);
  margin-bottom: .2rem;
}
.tomato-cell strong {
  display: block;
  font-family: var(--serif);
  font-size: .95rem;
  font-weight: 600;
  letter-spacing: .1em;
  margin-bottom: .25rem;
}
.tomato-cell small {
  display: block;
  font-size: .72rem;
  color: var(--ink-mute);
  line-height: 1.5;
  letter-spacing: .02em;
}

/* ========== 荐读脊柱 ========== */
.spine-summary {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: .65rem;
  margin: 0 0 1.1rem;
}
.spine-summary > div {
  padding: .7rem .85rem;
  background: rgba(255,255,255,.35);
  border: 1px solid var(--line);
}
.spine-summary b {
  display: block;
  font-size: .68rem;
  letter-spacing: .2em;
  color: var(--gold);
  margin-bottom: .35rem;
}
.spine-summary span {
  font-size: .86rem;
  color: var(--ink-soft);
  line-height: 1.55;
  letter-spacing: .04em;
}

.spine-rail {
  list-style: none;
  margin: 0 0 1.25rem;
  padding: 0 0 0 .35rem;
  border-left: 2px solid rgba(139,105,20,.35);
}
.spine-node {
  margin: 0;
  position: relative;
}
.spine-node button {
  display: grid;
  grid-template-columns: 1.1rem 3.2rem 1fr auto auto;
  gap: .5rem .65rem;
  align-items: center;
  width: 100%;
  padding: .55rem .75rem .55rem .9rem;
  text-align: left;
  border: 1px solid transparent;
  border-radius: 0;
  transition: background .15s, border-color .15s;
}
.spine-node button:hover {
  background: rgba(255,255,255,.5);
  border-color: var(--line);
}
.spine-dot {
  width: .55rem;
  height: .55rem;
  border-radius: 50%;
  background: var(--gold);
  border: 2px solid var(--paper);
  box-shadow: 0 0 0 1px rgba(139,105,20,.5);
  margin-left: -.2rem;
}
.spine-node.role-prologue .spine-dot { background: var(--cinnabar); box-shadow: 0 0 0 1px rgba(140,47,43,.45); }
.spine-node.role-interlude .spine-dot { background: #7a6a4a; }
.spine-node.role-coda .spine-dot { background: var(--ink-mute); }
.spine-node.is-peak .spine-dot {
  background: var(--gold-bright);
  width: .7rem;
  height: .7rem;
  box-shadow: 0 0 0 2px rgba(184,137,42,.45);
}
.spine-ord {
  font-family: var(--serif);
  font-size: .72rem;
  letter-spacing: .08em;
  color: var(--gold);
  white-space: nowrap;
}
.spine-title {
  font-family: var(--serif);
  font-size: .98rem;
  font-weight: 600;
  letter-spacing: .12em;
}
.spine-peak {
  font-style: normal;
  font-size: .65rem;
  letter-spacing: .12em;
  color: var(--paper);
  background: var(--gold);
  padding: .12rem .4rem;
  white-space: nowrap;
}
.spine-role {
  font-size: .7rem;
  letter-spacing: .1em;
  color: var(--ink-mute);
  white-space: nowrap;
}

/* 角色图例 */
.role-legend {
  display: flex;
  flex-wrap: wrap;
  gap: .55rem 1rem;
  margin: 0 0 1rem;
  font-size: .78rem;
  letter-spacing: .08em;
  color: var(--ink-mute);
}
.role-legend .leg {
  display: inline-flex;
  align-items: center;
  gap: .35rem;
}
.role-legend .leg i {
  width: .55rem;
  height: .55rem;
  border-radius: 50%;
  display: inline-block;
  background: var(--gold);
}
.role-legend .leg.role-prologue i { background: var(--cinnabar); }
.role-legend .leg.role-main i { background: var(--gold); }
.role-legend .leg.role-interlude i { background: #7a6a4a; }
.role-legend .leg.role-coda i { background: var(--ink-mute); }

/* 列表角色 / 高峰 */
.entry-row.role-prologue { border-left-color: rgba(140,47,43,.55); }
.entry-row.role-interlude { border-left-color: rgba(122,106,74,.55); }
.entry-row.role-coda { border-left-color: rgba(107,94,82,.5); }
.entry-row.is-peak {
  background: linear-gradient(90deg, rgba(184,137,42,.08), rgba(255,255,255,.32));
}
.peak-mark {
  display: inline-block;
  margin-left: .45rem;
  vertical-align: middle;
  font-family: var(--sans);
  font-size: .62rem;
  font-weight: 500;
  letter-spacing: .12em;
  color: var(--paper);
  background: var(--gold);
  padding: .08rem .35rem;
}

/* 阅读器进度与下程提示 */
.reader-progress {
  position: relative;
  height: 1.35rem;
  background: #efe6d8;
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
  display: flex;
  align-items: center;
}
.reader-progress i {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  height: 100%;
  background: linear-gradient(90deg, rgba(139,105,20,.18), rgba(184,137,42,.28));
  transition: width .2s ease;
  z-index: 0;
}
.reader-progress span {
  position: relative;
  z-index: 1;
  margin-left: auto;
  margin-right: .9rem;
  font-size: .68rem;
  letter-spacing: .14em;
  color: var(--ink-mute);
  font-family: var(--serif);
}
.reader-links .nav-hint {
  border-color: rgba(139,105,20,.4);
  color: var(--gold);
  letter-spacing: .06em;
}
.reader-links .nav-hint:hover {
  background: rgba(139,105,20,.1);
}
.reader-subnav button.is-peak i {
  color: var(--gold-bright);
}

/* archives */
.archive-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(15rem, 1fr));
  gap: .65rem;
}
.archive-card {
  padding: .95rem 1rem;
  text-align: left;
  border: 1px solid var(--line);
  background: rgba(255,255,255,.3);
}
.archive-card:hover { border-color: var(--gold); }
.archive-card b {
  display: block;
  font-family: var(--serif);
  font-size: .98rem;
  letter-spacing: .08em;
  margin-bottom: .3rem;
}
.archive-card span {
  font-size: .8rem;
  color: var(--ink-mute);
  line-height: 1.55;
}

/* time */
.time-strip {
  display: flex; flex-wrap: wrap; gap: .5rem;
  margin-bottom: 1.25rem;
}
.time-chip {
  padding: .45rem .75rem;
  border: 1px solid var(--line);
  background: rgba(255,255,255,.3);
  text-align: left;
}
.time-chip b {
  display: block;
  font-family: var(--serif);
  letter-spacing: .12em;
}
.time-chip small {
  color: var(--ink-mute);
  font-size: .72rem;
}
.time-chip.is-active {
  border-color: var(--gold);
  background: rgba(139,105,20,.08);
}
.record-card {
  padding: 1rem 1.15rem;
  border: 1px solid var(--line);
  border-left: 3px solid var(--cinnabar);
  background: rgba(255,255,255,.35);
  margin-bottom: .65rem;
}
.record-card span {
  font-size: .75rem;
  color: var(--gold);
  letter-spacing: .08em;
}
.record-card h3 {
  margin: .25rem 0;
  font-family: var(--serif);
  font-size: 1.1rem;
  letter-spacing: .1em;
}
.record-card p {
  margin: 0;
  font-size: .88rem;
  color: var(--ink-soft);
}

/* empty / loading */
.empty {
  padding: 2rem 1rem;
  text-align: center;
  color: var(--ink-mute);
  border: 1px dashed var(--line-strong);
  font-size: .9rem;
}

/* ========== Reader immersive ========== */
.reader {
  position: fixed; inset: 0; z-index: 50;
  display: grid;
  grid-template-rows: auto auto auto 1fr auto;
  background: #f7f1e7;
  color: var(--ink);
}
.reader-bar {
  display: grid;
  grid-template-columns: 1fr minmax(0, 36rem) 1fr;
  align-items: center;
  gap: .75rem;
  min-height: 3.4rem;
  padding: .45rem 1rem;
  background: rgba(26,20,16,.96);
  color: #f0e6d6;
  border-bottom: 1px solid rgba(184,137,42,.28);
}
.reader-bar-left, .reader-bar-right {
  display: flex; gap: .35rem; align-items: center;
}
.reader-bar-right { justify-content: flex-end; }
.reader-bar-center {
  text-align: center;
  min-width: 0;
}
.reader-kicker {
  letter-spacing: .22em;
  text-transform: none;
  display: block;
  font-size: .68rem;
  letter-spacing: .18em;
  color: rgba(184,137,42,.9);
  margin-bottom: .1rem;
}
.reader-title {
  margin: 0;
  font-family: var(--serif);
  font-size: 1rem;
  font-weight: 600;
  letter-spacing: .14em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.btn-bar {
  padding: .35rem .65rem;
  font-size: .78rem;
  letter-spacing: .1em;
  color: rgba(240,230,214,.78);
  border: 1px solid rgba(240,230,214,.18);
}
.btn-bar:hover {
  color: #fff;
  border-color: rgba(184,137,42,.5);
}
.btn-bar:disabled {
  opacity: .35;
  cursor: not-allowed;
}

.reader-subnav {
  display: flex; flex-wrap: wrap; gap: .35rem;
  justify-content: center;
  padding: .55rem 1rem;
  background: #efe6d8;
  border-bottom: 1px solid var(--line);
}
.reader-subnav button {
  padding: .3rem .6rem;
  font-size: .75rem;
  letter-spacing: .08em;
  border: 1px solid var(--line);
  color: var(--ink-soft);
  background: rgba(255,255,255,.4);
}
.reader-subnav button.is-active {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
}

.reader-scroll {
  overflow: auto;
  padding: 2rem 1.25rem 3rem;
}
.reader-inner {
  width: min(var(--read-max), 100%);
  margin: 0 auto;
}
.reader-inner .md-h1 {
  font-family: var(--serif);
  font-size: 1.85rem;
  font-weight: 600;
  letter-spacing: .12em;
  line-height: 1.35;
  margin: 0 0 1.25rem;
  text-align: center;
}
.reader-inner .md-h2 {
  font-family: var(--serif);
  font-size: 1.25rem;
  font-weight: 600;
  letter-spacing: .14em;
  margin: 2rem 0 .85rem;
  padding-bottom: .35rem;
  border-bottom: 1px solid var(--line);
}
.reader-inner .md-h3 {
  font-family: var(--serif);
  font-size: 1.05rem;
  font-weight: 600;
  letter-spacing: .1em;
  margin: 1.5rem 0 .55rem;
}
.reader-inner .md-h4 {
  font-size: .95rem;
  font-weight: 600;
  letter-spacing: .08em;
  margin: 1.25rem 0 .45rem;
}
.reader-inner p {
  margin: 0 0 1em;
  font-size: 1.02rem;
  line-height: 1.95;
  letter-spacing: .02em;
}
.reader-inner blockquote {
  margin: 1.1rem 0;
  padding: .35rem 0 .35rem 1rem;
  border-left: 3px solid var(--gold);
  color: var(--ink-soft);
  font-family: var(--serif);
}
.reader-inner ul, .reader-inner ol {
  margin: 0 0 1em;
  padding-left: 1.4rem;
  line-height: 1.85;
}
.reader-inner li { margin-bottom: .35rem; }
.reader-inner hr {
  border: 0;
  border-top: 1px solid var(--line-strong);
  margin: 1.75rem 0;
}
.reader-inner pre, .reader-inner .md-table {
  margin: 1rem 0;
  padding: .9rem 1rem;
  background: rgba(28,22,18,.04);
  border: 1px solid var(--line);
  overflow: auto;
  font-size: .88rem;
  line-height: 1.6;
  white-space: pre-wrap;
  font-family: ui-monospace, "SF Mono", Consolas, monospace;
}
.reader-inner code {
  font-family: ui-monospace, Consolas, monospace;
  font-size: .88em;
  background: rgba(28,22,18,.06);
  padding: .05em .3em;
}
.reader-inner strong { font-weight: 600; }
.reader-frontmatter {
  display: none;
}
.reader-meta {
  display: flex;
  flex-wrap: wrap;
  gap: .45rem .65rem;
  justify-content: center;
  margin: 0 auto 1.85rem;
  padding: 0 .25rem 1.1rem;
  max-width: var(--read-max);
  border-bottom: 1px solid var(--line);
}
.reader-meta .meta-chip {
  display: inline-flex;
  align-items: baseline;
  gap: .35rem;
  font-size: .78rem;
  letter-spacing: .06em;
  color: var(--ink-soft);
  padding: .2rem .55rem;
  border: 1px solid var(--line);
  background: rgba(255,255,255,.35);
}
.reader-meta .meta-chip i {
  font-style: normal;
  font-size: .68rem;
  letter-spacing: .14em;
  color: var(--gold);
  font-family: var(--serif);
}

.reader-foot {
  display: flex; justify-content: space-between; align-items: center;
  gap: 1rem;
  padding: .55rem 1.1rem;
  border-top: 1px solid var(--line);
  background: #efe6d8;
  font-size: .75rem;
  color: var(--ink-mute);
}
.reader-links {
  display: flex; flex-wrap: wrap; gap: .35rem;
}
.reader-links button {
  padding: .2rem .5rem;
  border: 1px solid var(--line-strong);
  letter-spacing: .06em;
  color: var(--ink-soft);
}
.reader-links button:hover {
  border-color: var(--gold);
  color: var(--gold);
}
.reader-path {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 40%;
}

/* search */
.search-layer {
  position: fixed; inset: 0; z-index: 60;
  background: rgba(26,20,16,.55);
  display: grid;
  place-items: start center;
  padding-top: 12vh;
}
.search-panel {
  width: min(36rem, calc(100% - 2rem));
  background: var(--paper);
  border: 1px solid var(--line-strong);
  box-shadow: var(--shadow);
  padding: 1.1rem 1.2rem 1.25rem;
}
.search-panel header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: .75rem;
}
.search-panel h2 {
  margin: 0;
  font-family: var(--serif);
  font-size: 1.1rem;
  letter-spacing: .2em;
}
.search-panel input {
  width: 100%;
  padding: .65rem .75rem;
  border: 1px solid var(--line-strong);
  background: #fff;
  outline: none;
}
.search-panel input:focus { border-color: var(--gold); }
.search-results { margin-top: .75rem; max-height: 50vh; overflow: auto; }
.search-result {
  display: block; width: 100%;
  text-align: left;
  padding: .65rem .55rem;
  border-bottom: 1px solid var(--line);
}
.search-result:hover { background: rgba(139,105,20,.08); }
.search-result b {
  display: block;
  font-family: var(--serif);
  letter-spacing: .06em;
}
.search-result small {
  color: var(--ink-mute);
  font-size: .75rem;
}

/* responsive */
@media (max-width: 900px) {
  html { font-size: 16px; }
  .hero { grid-template-columns: 1fr; }
  .metric-row { grid-template-columns: 1fr 1fr; }
  .group-grid { grid-template-columns: 1fr; }
  .nav-main { display: none; }
  .entry-row {
    grid-template-columns: 3.6rem 1fr auto;
  }
  .entry-row .genre-tag { font-size: .72rem; letter-spacing: .1em; }
  .entry-row .title-block b { font-size: 1rem; letter-spacing: .08em; }
  .tomato-grid { grid-template-columns: 1fr 1fr; }
  .spine-summary { grid-template-columns: 1fr; }
  .spine-node button {
    grid-template-columns: 1.1rem 2.6rem 1fr;
  }
  .spine-peak, .spine-role { display: none; }
  .entry-list.path-list .entry-row {
    grid-template-columns: 2.8rem 3rem 1fr;
  }
  .entry-row .badge { display: none; }
  .reader-bar {
    grid-template-columns: 1fr;
    gap: .4rem;
  }
  .reader-bar-center { order: -1; }
  .reader-bar-left, .reader-bar-right { justify-content: space-between; }
}
